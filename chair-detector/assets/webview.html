<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chair Detector</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3"></script>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050505;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #050505;
    }

    video,
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #status {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 10;
      max-width: calc(100vw - 32px);
      padding: 9px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.64);
      color: #ffffff;
      font-size: 14px;
      line-height: 1.35;
    }

    #counter {
      position: fixed;
      right: 16px;
      top: 16px;
      z-index: 10;
      min-width: 44px;
      padding: 9px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.64);
      color: #8dfcc1;
      font-size: 18px;
      font-weight: 800;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>
  <div id="status">Loading chair detector...</div>
  <div id="counter">0</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const requestedLabel = (params.get('label') || 'chair').toLowerCase();
    const minScore = clamp(Number(params.get('minScore')) || 0.55, 0.05, 0.95);

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const counterEl = document.getElementById('counter');

    let model;
    let busy = false;

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.round(rect.width * ratio));
      canvas.height = Math.max(1, Math.round(rect.height * ratio));
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    async function startCamera() {
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: {exact: 'environment'},
            width: {ideal: 1280},
            height: {ideal: 720}
          },
          audio: false
        });
      } catch (err) {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: {ideal: 'environment'},
            width: {ideal: 1280},
            height: {ideal: 720}
          },
          audio: false
        });
      }
      video.srcObject = stream;
      await new Promise((resolve) => {
        video.onloadedmetadata = resolve;
      });
      await video.play();
    }

    function getDrawBox(bbox) {
      const rect = canvas.getBoundingClientRect();
      const videoRatio = video.videoWidth / video.videoHeight;
      const viewRatio = rect.width / rect.height;

      let scale;
      let offsetX = 0;
      let offsetY = 0;
      if (videoRatio > viewRatio) {
        scale = rect.height / video.videoHeight;
        offsetX = (rect.width - video.videoWidth * scale) / 2;
      } else {
        scale = rect.width / video.videoWidth;
        offsetY = (rect.height - video.videoHeight * scale) / 2;
      }

      const x = offsetX + bbox[0] * scale;
      const y = offsetY + bbox[1] * scale;
      const width = bbox[2] * scale;
      const height = bbox[3] * scale;

      return {
        x: rect.width - x - width,
        y,
        width,
        height
      };
    }

    function drawDetections(detections) {
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);

      const chairs = detections.filter((item) => {
        return item.class === 'chair' && item.score >= minScore;
      });

      counterEl.textContent = String(chairs.length);
      statusEl.textContent = chairs.length === 1 ? '1 chair detected' : `${chairs.length} chairs detected`;

      ctx.lineWidth = 4;
      ctx.font = '700 16px Segoe UI, system-ui, sans-serif';
      ctx.textBaseline = 'top';

      for (const chair of chairs) {
        const box = getDrawBox(chair.bbox);
        const label = `${requestedLabel} ${Math.round(chair.score * 100)}%`;

        ctx.strokeStyle = '#35f28f';
        ctx.fillStyle = 'rgba(53, 242, 143, 0.16)';
        ctx.fillRect(box.x, box.y, box.width, box.height);
        ctx.strokeRect(box.x, box.y, box.width, box.height);

        const labelWidth = Math.max(88, ctx.measureText(label).width + 16);
        const labelY = Math.max(0, box.y - 30);
        ctx.fillStyle = '#35f28f';
        ctx.fillRect(box.x, labelY, labelWidth, 28);
        ctx.fillStyle = '#06160d';
        ctx.fillText(label, box.x + 8, labelY + 5);
      }
    }

    async function detectLoop() {
      if (!busy && model && video.readyState >= 2) {
        busy = true;
        try {
          drawDetections(await model.detect(video));
        } catch (err) {
          statusEl.textContent = `Detection error: ${err.message}`;
        } finally {
          busy = false;
        }
      }
      requestAnimationFrame(detectLoop);
    }

    async function init() {
      try {
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        await startCamera();
        statusEl.textContent = 'Loading model...';
        model = await cocoSsd.load({base: 'lite_mobilenet_v2'});
        statusEl.textContent = 'Looking for chairs...';
        detectLoop();
      } catch (err) {
        statusEl.textContent = `Init error: ${err.message}`;
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
