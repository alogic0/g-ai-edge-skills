<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Object Detector</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050505;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #050505;
    }

    video,
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #status {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 10;
      max-width: calc(100vw - 32px);
      padding: 9px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.64);
      color: #ffffff;
      font-size: 14px;
      line-height: 1.35;
    }

    #counter {
      position: fixed;
      right: 16px;
      top: 16px;
      z-index: 10;
      min-width: 44px;
      padding: 9px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.64);
      color: #8dfcc1;
      font-size: 18px;
      font-weight: 800;
      text-align: center;
    }

    #target-toggle {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 12;
      min-height: 44px;
      padding: 0 16px;
      border: 0;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.72);
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
    }

    #voice-toggle {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 12;
      min-height: 44px;
      padding: 0 16px;
      border: 0;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.72);
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
    }

    #voice-toggle.off {
      color: rgba(255, 255, 255, 0.7);
    }

    #target-panel {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 11;
      max-height: 46vh;
      padding: 14px 14px 72px;
      overflow-y: auto;
      background: rgba(8, 10, 12, 0.94);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      box-sizing: border-box;
    }

    #target-panel[hidden] {
      display: none;
    }

    #target-summary {
      margin: 0 0 10px;
      color: #ffffff;
      font-size: 14px;
      line-height: 1.35;
    }

    #target-actions {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    #clear-targets {
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
    }

    #target-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(108px, 1fr));
      gap: 8px;
    }

    .target-chip {
      min-height: 38px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 14px;
      text-align: center;
    }

    .target-chip.active {
      border-color: #35f28f;
      background: #35f28f;
      color: #06160d;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>
  <div id="status">Loading object detector...</div>
  <div id="counter">0</div>
  <button id="target-toggle" type="button" aria-expanded="false">Targets</button>
  <button id="voice-toggle" type="button" aria-pressed="true">Voice on</button>
  <div id="target-panel" hidden>
    <p id="target-summary"></p>
    <div id="target-actions">
      <button id="clear-targets" type="button">Clear all</button>
    </div>
    <div id="target-grid"></div>
  </div>

  <script type="module">
    import {
      FilesetResolver,
      ObjectDetector
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

    const params = new URLSearchParams(window.location.search);
    const COCO_LABELS = [
      'person', 'bicycle', 'car', 'motorcycle', 'airplane', 'bus', 'train',
      'truck', 'boat', 'traffic light', 'fire hydrant', 'stop sign',
      'parking meter', 'bench', 'bird', 'cat', 'dog', 'horse', 'sheep', 'cow',
      'elephant', 'bear', 'zebra', 'giraffe', 'backpack', 'umbrella',
      'handbag', 'tie', 'suitcase', 'frisbee', 'skis', 'snowboard',
      'sports ball', 'kite', 'baseball bat', 'baseball glove', 'skateboard',
      'surfboard', 'tennis racket', 'bottle', 'wine glass', 'cup', 'fork',
      'knife', 'spoon', 'bowl', 'banana', 'apple', 'sandwich', 'orange',
      'broccoli', 'carrot', 'hot dog', 'pizza', 'donut', 'cake', 'chair',
      'couch', 'potted plant', 'bed', 'dining table', 'toilet', 'tv',
      'laptop', 'mouse', 'remote', 'keyboard', 'cell phone', 'microwave',
      'oven', 'toaster', 'sink', 'refrigerator', 'book', 'clock', 'vase',
      'scissors', 'teddy bear', 'hair drier', 'toothbrush'
    ];

    let targets = parseTargets(params);
    let targetSet = new Set(targets);
    const minScore = clamp(Number(params.get('minScore')) || 0.55, 0.05, 0.95);

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const counterEl = document.getElementById('counter');
    const targetToggle = document.getElementById('target-toggle');
    const voiceToggle = document.getElementById('voice-toggle');
    const targetPanel = document.getElementById('target-panel');
    const targetSummary = document.getElementById('target-summary');
    const clearTargets = document.getElementById('clear-targets');
    const targetGrid = document.getElementById('target-grid');

    let objectDetector;
    let voiceEnabled = true;
    const lastAnnouncementAt = new Map();
    const ANNOUNCEMENT_COOLDOWN_MS = 6000;

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function parseTargets(urlParams) {
      const rawTargets = urlParams.get('targets');
      if (rawTargets) {
        try {
          const parsedTargets = JSON.parse(rawTargets);
          if (Array.isArray(parsedTargets)) {
            const normalized = parsedTargets
              .map((target) => String(target).trim().toLowerCase())
              .filter(Boolean);
            if (normalized.length > 0) {
              return normalized;
            }
          }
        } catch (err) {
          console.warn('Failed to parse targets.', err);
        }
      }

      const fallbackTarget = urlParams.get('target') || urlParams.get('label') || '';
      return [fallbackTarget.trim().toLowerCase()].filter(Boolean);
    }

    function formatTargets() {
      if (targets.length === 0) {
        return 'objects';
      }
      if (targets.length === 1) {
        return targets[0];
      }
      if (targets.length === 2) {
        return `${targets[0]} or ${targets[1]}`;
      }
      return `${targets.slice(0, -1).join(', ')}, or ${targets[targets.length - 1]}`;
    }

    function updateTargetSummary() {
      targetSummary.textContent = targets.length > 0 ?
        `Detecting: ${targets.join(', ')}` :
        'No targets selected';
      targetToggle.textContent = targets.length > 0 ?
        `Targets (${targets.length})` :
        'Targets';
    }

    function setTargets(nextTargets) {
      targets = nextTargets;
      targetSet = new Set(targets);
      updateTargetSummary();
      for (const button of targetGrid.querySelectorAll('.target-chip')) {
        button.classList.toggle('active', targetSet.has(button.dataset.target));
      }
    }

    function renderTargetSelector() {
      targetGrid.innerHTML = '';
      for (const label of COCO_LABELS) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'target-chip';
        button.dataset.target = label;
        button.textContent = label;
        button.addEventListener('click', () => {
          const nextSet = new Set(targets);
          if (nextSet.has(label)) {
            nextSet.delete(label);
          } else {
            nextSet.add(label);
          }
          setTargets(COCO_LABELS.filter((item) => nextSet.has(item)));
        });
        targetGrid.appendChild(button);
      }
      setTargets(COCO_LABELS.filter((item) => targetSet.has(item)));
    }

    function getAnnouncementLabel(categoryName) {
      return categoryName === 'person' ? 'human' : categoryName;
    }

    function setVoiceEnabled(enabled) {
      voiceEnabled = enabled;
      voiceToggle.textContent = enabled ? 'Voice on' : 'Voice off';
      voiceToggle.classList.toggle('off', !enabled);
      voiceToggle.setAttribute('aria-pressed', String(enabled));
      if (!enabled && 'speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
    }

    function announceDetections(matches) {
      if (!voiceEnabled || !('speechSynthesis' in window)) {
        return;
      }

      const now = performance.now();
      const detectedCategories = new Set();
      for (const match of matches) {
        const category = getCategory(match);
        if (category) {
          detectedCategories.add(category.categoryName);
        }
      }

      for (const categoryName of detectedCategories) {
        const lastSpoken = lastAnnouncementAt.get(categoryName) || 0;
        if (now - lastSpoken < ANNOUNCEMENT_COOLDOWN_MS) {
          continue;
        }

        lastAnnouncementAt.set(categoryName, now);
        const utterance = new SpeechSynthesisUtterance(
          `${getAnnouncementLabel(categoryName)} detected`
        );
        utterance.rate = 1;
        utterance.pitch = 1;
        window.speechSynthesis.speak(utterance);
      }
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.round(rect.width * ratio));
      canvas.height = Math.max(1, Math.round(rect.height * ratio));
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    async function startCamera() {
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: {exact: 'environment'},
            width: {ideal: 1280},
            height: {ideal: 720}
          },
          audio: false
        });
      } catch (err) {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: {ideal: 'environment'},
            width: {ideal: 1280},
            height: {ideal: 720}
          },
          audio: false
        });
      }
      video.srcObject = stream;
      await new Promise((resolve) => {
        video.onloadedmetadata = resolve;
      });
      await video.play();
    }

    function getDrawBox(bbox) {
      const rect = canvas.getBoundingClientRect();
      const videoRatio = video.videoWidth / video.videoHeight;
      const viewRatio = rect.width / rect.height;

      let scale;
      let offsetX = 0;
      let offsetY = 0;
      if (videoRatio > viewRatio) {
        scale = rect.height / video.videoHeight;
        offsetX = (rect.width - video.videoWidth * scale) / 2;
      } else {
        scale = rect.width / video.videoWidth;
        offsetY = (rect.height - video.videoHeight * scale) / 2;
      }

      const x = offsetX + bbox[0] * scale;
      const y = offsetY + bbox[1] * scale;
      const width = bbox[2] * scale;
      const height = bbox[3] * scale;

      return {x, y, width, height};
    }

    function getCategory(detection) {
      if (!detection.categories || detection.categories.length === 0) {
        return null;
      }
      return detection.categories[0];
    }

    function drawDetections(result) {
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);

      const matches = (result.detections || []).filter((detection) => {
        const category = getCategory(detection);
        return category &&
          targetSet.has(category.categoryName) &&
          category.score >= minScore;
      });

      counterEl.textContent = String(matches.length);
      statusEl.textContent = targets.length === 0 ?
        'Select targets' :
        (matches.length === 1 ?
          `1 ${formatTargets()} detection` :
          `${matches.length} ${formatTargets()} detections`);
      announceDetections(matches);

      ctx.lineWidth = 4;
      ctx.font = '700 16px Segoe UI, system-ui, sans-serif';
      ctx.textBaseline = 'top';

      for (const match of matches) {
        const category = getCategory(match);
        const box = getDrawBox([
          match.boundingBox.originX,
          match.boundingBox.originY,
          match.boundingBox.width,
          match.boundingBox.height
        ]);
        const label = `${category.categoryName} ${Math.round(category.score * 100)}%`;

        ctx.strokeStyle = '#35f28f';
        ctx.fillStyle = 'rgba(53, 242, 143, 0.16)';
        ctx.fillRect(box.x, box.y, box.width, box.height);
        ctx.strokeRect(box.x, box.y, box.width, box.height);

        const labelWidth = Math.max(88, ctx.measureText(label).width + 16);
        const labelY = Math.max(0, box.y - 30);
        ctx.fillStyle = '#35f28f';
        ctx.fillRect(box.x, labelY, labelWidth, 28);
        ctx.fillStyle = '#06160d';
        ctx.fillText(label, box.x + 8, labelY + 5);
      }
    }

    function detectLoop() {
      if (objectDetector && video.readyState >= 2) {
        try {
          drawDetections(objectDetector.detectForVideo(video, performance.now()));
        } catch (err) {
          statusEl.textContent = `Detection error: ${err.message}`;
        }
      }
      requestAnimationFrame(detectLoop);
    }

    async function init() {
      try {
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        targetToggle.addEventListener('click', () => {
          const expanded = targetPanel.hidden;
          targetPanel.hidden = !expanded;
          targetToggle.setAttribute('aria-expanded', String(expanded));
        });
        clearTargets.addEventListener('click', () => {
          setTargets([]);
        });
        voiceToggle.addEventListener('click', () => {
          setVoiceEnabled(!voiceEnabled);
        });
        setVoiceEnabled(true);
        renderTargetSelector();
        await startCamera();
        statusEl.textContent = 'Loading MediaPipe object detector...';
        const filesetResolver = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
        );
        objectDetector = await ObjectDetector.createFromOptions(filesetResolver, {
          baseOptions: {
            modelAssetPath:
              "https://storage.googleapis.com/mediapipe-tasks/object_detector/efficientdet_lite0_uint8.tflite",
            delegate: "CPU"
          },
          scoreThreshold: minScore,
          runningMode: "VIDEO"
        });
        statusEl.textContent = `Looking for ${formatTargets()}...`;
        detectLoop();
      } catch (err) {
        statusEl.textContent = `Init error: ${err.message}`;
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
