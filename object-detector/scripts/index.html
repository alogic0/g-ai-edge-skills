<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Object Detector</title>
  </head>
  <body>
    <script>
      function normalizeTargets(jsonObj) {
        if (Array.isArray(jsonObj.targets)) {
          return jsonObj.targets
            .map((target) => String(target).trim().toLowerCase())
            .filter(Boolean);
        }

        const singleTarget = jsonObj.target || jsonObj.label || 'chair';
        return [String(singleTarget).trim().toLowerCase()].filter(Boolean);
      }

      window['ai_edge_gallery_get_result'] = async (data) => {
        const jsonObj = JSON.parse(data || '{}');
        const targets = normalizeTargets(jsonObj);
        const minScore = Number.isFinite(Number(jsonObj.minScore)) ? Number(jsonObj.minScore) : 0.55;
        const encodedTargets = encodeURIComponent(JSON.stringify(targets.length > 0 ? targets : ['chair']));

        return JSON.stringify({
          webview: {
            url: `webview.html?targets=${encodedTargets}&minScore=${encodeURIComponent(minScore)}`
          }
        });
      };
    </script>
  </body>
</html>
